services:
  api:
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./generated_docs:/app/generated_docs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --no-access-log

  db:
    ports:
      - "127.0.0.1:5432:5432"

  worker-documents:
    volumes:
      - .:/app
      - ./generated_docs:/app/generated_docs

  worker-notifications:
    volumes:
      - .:/app

  beat:
    volumes:
      - .:/app

  rabbitmq:
    ports:
      - "127.0.0.1:15672:15672"
      - "127.0.0.1:5672:5672"

  flower:
    build: .
    command: celery -A app.celery_app flower --port=5555
    ports:
      - "127.0.0.1:5555:5555"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - rabbitmq

  loki:
    ports:
      - "3100:3100"

  prometheus:
    ports:
      - "9090:9090"
